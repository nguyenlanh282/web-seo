version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seopen_postgres_dev
    environment:
      POSTGRES_DB: seopen
      POSTGRES_USER: seopen
      POSTGRES_PASSWORD: seopen_secret
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seopen"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seopen_redis_dev
    command: redis-server --appendonly yes --requirepass redis_secret
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: seopen_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@seopen.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_dev_data:
  redis_dev_data:
