version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seopen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: seopen
      POSTGRES_USER: seopen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seopen_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seopen"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seopen_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: seopen_api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: seopen_web
    restart: unless-stopped
    env_file:
      - ./apps/web/.env
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules

  migration:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: seopen_migration
    command: npx prisma migrate deploy
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migration

volumes:
  postgres_data:
  redis_data:
