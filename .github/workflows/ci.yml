# =============================================================================
# SEOPen — CI: Lint + Typecheck + Test
# Runs on every push & pull_request to master/main
# On success → triggers cd.yml (push to master/main only)
# =============================================================================

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-typecheck-test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build @seopen/shared
        run: npm run build --workspace=packages/shared

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: apps/api

      - name: Typecheck — API
        run: npm run typecheck --workspace=apps/api

      - name: Typecheck — Web
        run: npm run typecheck --workspace=apps/web

      - name: Lint — API
        run: npm run lint --workspace=apps/api

      - name: Lint — Web
        run: npm run lint --workspace=apps/web

      - name: Test — API
        run: npm test --workspace=apps/api
