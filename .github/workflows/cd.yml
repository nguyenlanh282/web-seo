# =============================================================================
# SEOPen — CD: Build → Push GHCR → Deploy VPS
# Triggered only when CI workflow succeeds on master/main
#
# Required GitHub Secrets:
#   SSH_HOST          VPS IP or hostname
#   SSH_USER          SSH username (e.g. ubuntu, deploy)
#   SSH_PRIVATE_KEY   Private key matching the authorised key on VPS
#   SSH_PORT          SSH port (optional, defaults to 22)
#   DEPLOY_PATH       Absolute path on VPS  e.g. /opt/seopen
#   GHCR_PAT          GitHub PAT with read:packages — used by VPS to pull images
#
# Required GitHub Variables:
#   NEXT_PUBLIC_API_URL       e.g. https://api.example.com
#   NEXT_PUBLIC_POSTHOG_KEY   optional
#   NEXT_PUBLIC_SENTRY_DSN    optional
# =============================================================================

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, main]

# Never cancel an active deploy — let it finish
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build & Push Docker images in parallel (api + web) ─────────────────────
  build:
    name: Build & Push — ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run if CI passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: true
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
            image: seopen-api
          - app: web
            dockerfile: apps/web/Dockerfile
            image: seopen-web

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ vars.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}

  # ── Deploy to VPS after both images are pushed ──────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: COMMIT_SHA,GITHUB_ACTOR,GITHUB_REPOSITORY_OWNER,GHCR_PAT,DEPLOY_PATH
          script_path: .github/scripts/deploy.sh
