# =============================================================================
# SEOPen — docker-compose.dokploy.yml
#
# Single-container deployment: Web (Next.js :3000) + API (NestJS :4000)
# Traefik (managed by Dokploy) routes all traffic → port 3000
# API port 4000 is internal — accessed via Next.js rewrites (/api/v1/*)
#
# Setup in Dokploy UI:
#   1. Create new "Docker Compose" application
#   2. Set Compose file → docker-compose.dokploy.yml
#   3. Set domain → your-domain.com → port 3000
#   4. Paste all env vars from .env.example → Environment tab
#   5. Deploy
# =============================================================================

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: seopen
      POSTGRES_USER: seopen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - seopen_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seopen -d seopen"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - seopen_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Application (Web + API combined) ────────────────────────────────────────

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are baked into the JS bundle at build time
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production

      # ── Database ──────────────────────────────────────────────────────────
      DATABASE_URL: postgresql://seopen:${POSTGRES_PASSWORD}@postgres:5432/seopen

      # ── Redis ─────────────────────────────────────────────────────────────
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # ── JWT ───────────────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

      # ── Encryption ────────────────────────────────────────────────────────
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}

      # ── AI / SERP ─────────────────────────────────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SERP_API_KEY: ${SERP_API_KEY}

      # ── Google OAuth ──────────────────────────────────────────────────────
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${NEXT_PUBLIC_APP_URL}/api/v1/auth/google/callback

      # ── CORS / URLs ───────────────────────────────────────────────────────
      CORS_ORIGINS: ${NEXT_PUBLIC_APP_URL}
      FRONTEND_URL: ${NEXT_PUBLIC_APP_URL}

      # ── NextAuth ──────────────────────────────────────────────────────────
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}

      # ── Internal: Next.js → NestJS rewrite (same container) ──────────────
      API_URL: http://localhost:4000

      # ── Monitoring (optional) ─────────────────────────────────────────────
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seopen_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 -S 2>&1 | grep -q '200\\|301\\|302' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  seopen_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
