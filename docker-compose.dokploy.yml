# =============================================================================
# SEOPen — Dokploy Deployment
#
# Usage: Specify this file in Dokploy UI as the Compose file
#        Dokploy builds images from Dockerfiles directly (no GHCR pull)
#
# Domains (configure in Dokploy UI — Traefik handles SSL/routing):
#   api  →  api.your-domain.com   (port 4000)
#   web  →  your-domain.com       (port 3000)
#
# Environment variables: set in Dokploy UI → Environment tab
# Required vars listed in .env.example
# =============================================================================

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: seopen
      POSTGRES_USER: seopen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - seopen_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seopen -d seopen"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - seopen_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://seopen:${POSTGRES_PASSWORD}@postgres:5432/seopen
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SERP_API_KEY: ${SERP_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seopen_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health | grep -q 'ok' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* are baked into the JS bundle at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      # Internal API URL for Next.js server-side rewrites (container network)
      API_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - seopen_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 -S 2>&1 | grep -q '200\\|301\\|302' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  seopen_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
