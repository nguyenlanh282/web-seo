<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main diagonal gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- White gradient for pen body -->
    <linearGradient id="penGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.97"/>
      <stop offset="100%" stop-color="#e0d0ff" stop-opacity="0.93"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Inner shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <!-- Clip for rounded rect -->
    <clipPath id="roundedClip">
      <rect x="11" y="11" width="490" height="490" rx="80" ry="80"/>
    </clipPath>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect x="11" y="11" width="490" height="490" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Inner highlight overlay -->
  <ellipse cx="256" cy="140" rx="200" ry="120" fill="white" fill-opacity="0.06"/>

  <!-- ===== PEN ===== -->
  <g clip-path="url(#roundedClip)">
    <!-- Pen cap -->
    <rect x="224" y="77" width="56" height="50" rx="12" ry="12"
          fill="white" fill-opacity="0.88" filter="url(#shadow)"/>
    <!-- Cap highlight -->
    <rect x="224" y="77" width="14" height="50" rx="4" fill="white" fill-opacity="0.18"/>
    <!-- Cap clip -->
    <rect x="270" y="79" width="8" height="46" rx="3" fill="white" fill-opacity="0.70"/>

    <!-- Ferrule (band) -->
    <rect x="220" y="124" width="64" height="16" rx="3" fill="white" fill-opacity="0.65"/>

    <!-- Pen body -->
    <polygon points="222,140  290,140  314,222  266,315  252,355  238,315  190,222"
             fill="url(#penGrad)" filter="url(#shadow)"/>

    <!-- Nib slit -->
    <line x1="252" y1="250" x2="252" y2="355" stroke="#a78bfa" stroke-width="3" stroke-opacity="0.7"/>

    <!-- Ink drop -->
    <ellipse cx="252" cy="362" rx="6" ry="8" fill="#c4b5fd" fill-opacity="0.95"/>
    <ellipse cx="252" cy="374" rx="3" ry="4" fill="#c4b5fd" fill-opacity="0.7"/>
  </g>

  <!-- ===== MAGNIFYING GLASS ===== -->
  <g clip-path="url(#roundedClip)" filter="url(#glow)">
    <!-- Glass bg tint -->
    <circle cx="330" cy="162" r="38" fill="white" fill-opacity="0.10"/>
    <!-- Ring -->
    <circle cx="330" cy="162" r="38" fill="none" stroke="white" stroke-width="7" stroke-opacity="0.92"/>
    <!-- Handle -->
    <line x1="357" y1="189" x2="381" y2="213"
          stroke="white" stroke-width="8" stroke-linecap="round" stroke-opacity="0.92"/>
    <!-- Lens glint -->
    <ellipse cx="318" cy="150" rx="9" ry="6" fill="white" fill-opacity="0.38" transform="rotate(-30,318,150)"/>
    <circle cx="324" cy="144" r="3" fill="white" fill-opacity="0.25"/>
  </g>

  <!-- ===== TREND ARROW (lower-left) ===== -->
  <g clip-path="url(#roundedClip)">
    <polyline points="162,250  180,236  198,220  216,205"
              fill="none" stroke="white" stroke-width="3.5" stroke-opacity="0.65"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrowhead -->
    <polygon points="216,205  204,198  206,210  220,200"
             fill="white" fill-opacity="0.70"/>
    <!-- Chart bars hint -->
    <rect x="162" y="248" width="6" height="12" rx="1" fill="white" fill-opacity="0.35"/>
    <rect x="172" y="240" width="6" height="20" rx="1" fill="white" fill-opacity="0.35"/>
    <rect x="182" y="230" width="6" height="30" rx="1" fill="white" fill-opacity="0.35"/>
  </g>

  <!-- ===== SPARKLE ACCENTS ===== -->
  <circle cx="182" cy="310" r="3" fill="white" fill-opacity="0.55"/>
  <circle cx="345" cy="272" r="2" fill="white" fill-opacity="0.48"/>
  <circle cx="172" cy="110" r="3" fill="white" fill-opacity="0.50"/>
  <circle cx="340" cy="340" r="2" fill="white" fill-opacity="0.42"/>

  <!-- ===== BRAND TEXT ===== -->
  <text x="256" y="458"
        font-family="Arial Black, Arial, sans-serif"
        font-size="68" font-weight="900"
        text-anchor="middle"
        filter="url(#shadow)">
    <tspan fill="#ffffff" fill-opacity="1">SEO</tspan><tspan fill="#e9d5ff" fill-opacity="0.97">Pen</tspan>
  </text>

</svg>